services:
  backend:
    build:
      context: ./backend
    container_name: ai-arena-backend
    env_file:
      - path: ./backend/.env
        required: false
      - path: ./backend/.env.example
        required: true
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,backend,frontend"
      CORS_ALLOWED_ORIGINS: "http://localhost:8080,http://127.0.0.1:8080"
      CSRF_TRUSTED_ORIGINS: "http://localhost:8080,http://127.0.0.1:8080"
      FASTAPI_SERVICE_URL: "http://fastapi:9000"
      DJANGO_SECURE_SSL_REDIRECT: "0"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - fastapi

  fastapi:
    build:
      context: ./fastapi_service
    container_name: ai-arena-fastapi
    env_file:
      - path: ./fastapi_service/.env
        required: false
      - path: ./fastapi_service/.env.example
        required: true
    environment:
      FASTAPI_CORS_ORIGINS: "http://localhost:8080,http://127.0.0.1:8080"
    volumes:
      - ./fastapi_service:/app
    ports:
      - "9000:9000"

  frontend:
    build:
      context: ./frontend
    container_name: ai-arena-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
